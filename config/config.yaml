# Main configuration file for Pixels Lance
# Environment variables can be referenced using ${VAR_NAME} syntax

rpc:
  # RPC endpoint URL (for HTTP-JSON, can use environment variable)
  url: localhost:9091
  # Request timeout in seconds
  timeout: 30
  # Maximum retry attempts
  max_retries: 3
  # gRPC configuration (default enabled for PixelsPollingService)
  use_grpc: true
  grpc_host: localhost
  grpc_port: 9091

lancedb:
  # Path to LanceDB database directory
  db_path: ./lancedb
  # Table name for storing data
  table_name: pixel_data
  # Write mode: 'overwrite' or 'append'
  mode: append

parser:
  # Path to schema definition file
  schema_file: config/schema.yaml
  # Data encoding
  encoding: utf-8

# Batch size for processing data
batch_size: 100

# Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level: INFO
