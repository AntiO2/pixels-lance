# Main configuration file for Pixels Lance
# Environment variables can be referenced using ${VAR_NAME} syntax

rpc:
  # RPC endpoint URL (for HTTP-JSON, can use environment variable)
  url: localhost:9091
  # Request timeout in seconds
  timeout: 30
  # Maximum retry attempts
  max_retries: 3
  # Batch size for RPC polling (records per batch before flushing to storage)
  batch_size: 1000
  # Maximum seconds to wait before flushing a batch to storage
  batch_timeout: 30
  # Maximum pending records (buffered + flushing) before pausing polling
  # Prevents memory overflow when flush is slower than poll speed
  max_pending_records: 1000
  # Synchronous flush mode: when enabled, processes one flush task at a time (reduces memory pressure)
  sync: false
  # gRPC configuration (default enabled for PixelsPollingService)
  use_grpc: true
  grpc_host: ${SINK_SERVER_HOST}
  grpc_port: 9091

lancedb:
  # Base path for Lance datasets
  # 本地存储: ./lancedb
  # AWS S3: s3://my-bucket/lancedb
  # MinIO: s3://my-bucket/lancedb (需配置 endpoint)
  # db_path: ./lancedb
  # Default table name (CLI 会通过 --table 参数覆盖)
  table_name: pixel_data
  
  # Write mode: 'overwrite' or 'append'
  mode: append
  
  # Storage options for object stores (S3, GCS, Azure)
  # 留空 {} 表示使用本地存储，或使用环境变量中的 AWS 凭证
  # storage_options: {}
  
  # HTTP(S) 代理配置（可选）
  # proxy: ${HTTP_PROXY:-}
  
  # ========== S3 配置示例 ==========
  # 方式 1: AWS S3 (使用环境变量)
  db_path: ${LANCEDB_PATH}
  storage_options:
    region: ${AWS_REGION}
    access_key_id: ${AWS_ACCESS_KEY_ID}
    secret_access_key: ${AWS_SECRET_ACCESS_KEY}
  proxy: ${HTTP_PROXY:-}
  
  # 方式 2: MinIO (S3-compatible)
  # db_path: s3://my-bucket/lancedb
  # storage_options:
  #   region: us-east-1
  #   endpoint: http://localhost:9000
  #   access_key_id: ${AWS_ACCESS_KEY_ID}
  #   secret_access_key: ${AWS_SECRET_ACCESS_KEY}
  
  # 方式 3: 直接写凭证 (不推荐，仅用于测试)
  # db_path: s3://my-bucket/lancedb
  # storage_options:
  #   region: us-east-1
  #   access_key_id:
  #   secret_access_key: 

parser:
  # Path to schema definition file
  schema_file: config/schema_hybench.yaml
  # Data encoding
  encoding: utf-8
  # Whether table/field names are case-sensitive (false: convert to lowercase)
  case_sensitive: false

# Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level: INFO

# Resource monitoring configuration
monitor:
  # Enable resource monitoring
  enabled: true
  # Path to write monitoring data (CSV format)
  output_path: ./logs/resource_stats.csv
  # Sampling interval in seconds
  interval: 2.0
